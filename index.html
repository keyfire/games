<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyFire Games</title>
  <style>
    body { margin: 0; padding: 40px 16px; background: #0e0e1a; color: #e7e7ff;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
    main { max-width: 640px; margin: 0 auto; text-align: center; }
    h1 { font-size: 28px; }
    .muted { color: #8a8ab0; }
    .games { display: grid; gap: 16px; margin-top: 32px; }
    a.card { display: block; padding: 20px; border-radius: 14px; text-decoration: none;
      background: #1b1b30; border: 1px solid #2b2b48; color: #fff; transition: border-color .15s; }
    a.card:hover { border-color: #4e6ef2; }
    a.card .t { font-size: 20px; font-weight: 700; }
    a.card .d { color: #8a8ab0; font-size: 14px; margin-top: 6px; }
  </style>
</head>
<body>
<main>
  <h1>KeyFire Games</h1>
  <p class="muted">Казуальные игры – играются прямо в браузере и Telegram.</p>
  <div class="games">
    <a class="card" href="case-simulator/">
      <div class="t">Симулятор кейсов: Космос</div>
      <div class="d">Открывай кейсы, крути рулетку, собери коллекцию из 20 артефактов.</div>
    </a>
  </div>
</main>
</body>
</html>
