<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Симулятор кейсов: Космос</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Продолжение авроры игры – letterbox-поля сливаются с канвасом.
         Гамма портфеля: фиолет сверху, розовое зарево снизу (как в 2048). */
      background:
        radial-gradient(55% 38% at 16% 8%, rgba(160, 122, 245, 0.45), transparent 65%),
        radial-gradient(48% 34% at 90% 14%, rgba(201, 155, 240, 0.32), transparent 65%),
        radial-gradient(60% 42% at 30% 92%, rgba(240, 122, 216, 0.40), transparent 65%),
        #1a1430;
      touch-action: none;
    }
    #game { width: 100%; height: 100%; }
  </style>
  <script type="module" crossorigin src="./assets/index-ljFwCEhb.js"></script>
</head>
<body>
  <div id="game"></div>
  <script>
(function () {
  var NL = String.fromCharCode(10);
  var errs = [];
  function show() {
    var el = document.getElementById("bootlog");
    if (!el) {
      el = document.createElement("div");
      el.id = "bootlog";
      el.style.cssText = "position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;background:rgba(20,16,40,.94);color:#ffb3c8;font:12px/1.5 monospace;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.25);white-space:pre-wrap;word-break:break-all;max-height:45vh;overflow:auto";
      (document.body || document.documentElement).appendChild(el);
    }
    el.textContent = "Диагностика запуска:" + NL + errs.join(NL);
  }
  function add(m) { errs.push(m); show(); }
  window.addEventListener("error", function (e) {
    if (e && e.target && e.target !== window && (e.target.src || e.target.href)) {
      add("resource fail: " + String(e.target.src || e.target.href).split("/").pop()); return;
    }
    add((e.message || "error") + (e.filename ? " @ " + String(e.filename).split("/").pop() + ":" + e.lineno : ""));
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason; add("promise: " + (r && r.message ? r.message : String(r)));
  });
  setTimeout(function () {
    if (document.querySelector("canvas")) { var el = document.getElementById("bootlog"); if (el && !errs.length) el.remove(); return; }
    add("Игра не стартовала за 7с. UA: " + navigator.userAgent);
    var s = document.querySelector("script[type=module]");
    if (s && s.src && window.fetch) {
      fetch(s.src, { method: "HEAD" }).then(function (r) { add("bundle HEAD: " + r.status); }, function (er) { add("bundle fetch fail: " + String(er)); });
    }
  }, 7000);
})();
</script>
</body>
</html>
